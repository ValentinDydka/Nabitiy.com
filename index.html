<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Регистрация на Набитый.com</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inconsolata:wght@200..900&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mozilla+Text:wght@200..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap&quot; rel="stylesheet">
</head>
    <body>
        <form action="https://valentindydka.github.io/Nabitiy.com-Select/" method="post">
            <h1>Регистрация</h1>
            
            <div class="reg_part1">
                <label>Имя:</label>
                <input type="text" name="user-name" placeholder="Введите имя">
        
                <label>Пароль:</label>
                <input type="password" name="password-user" minlength="8" required>
            </div>
            
            <div class="reg_part2">
                <label>Мужской</label>
                <input type="radio" name="gender-user">
                <label>|</label>
                <label>Женский</label>
                <input type="radio" name="gender-user">
            </div>

            <br>
            <div class="reg_part2">
                <label>Согласие на подчинение великому фанику</label>
                <input type="checkbox" name="soglasie" required>
            </div>

            <button  type="submit">Зарегистрироваться</button>
            </form>
    </body>

</html>
